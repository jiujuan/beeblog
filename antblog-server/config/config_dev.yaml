app:
  name: antblog
  env: dev
  version: 1.0.0
  debug: true

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 30
  write_timeout: 30

database:
  driver: mysql
  dsn: "root:root123456@tcp(127.0.0.1:3306)/antblog?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600
  log_level: warn

redis:
  addr: 127.0.0.1:6379
  password: "foofoo"
  db: 0
  pool_size: 10
  min_idle_conns: 2
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3

jwt:
  secret: "antblog-change-this-secret-in-production"
  access_expiry: 120     # 分钟，2小时
  refresh_expiry: 7      # 天
  issuer: antblog

log:
  level: debug
  format: console
  output: stdout
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true

upload:
  driver: local
  local_path: ./uploads
  base_url: http://localhost:8080/uploads
  max_size: 10485760   # 10MB
  allowed_types:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
